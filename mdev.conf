# Syntax:
# [-]devicename_regex user:group mode [=path]|[>path]|[!] [@|$|*cmd args...]
# [-]$ENVVAR=regex    user:group mode [=path]|[>path]|[!] [@|$|*cmd args...]
# [-]@maj,min[-min2]  user:group mode [=path]|[>path]|[!] [@|$|*cmd args...]
#
# [-]: do not stop on this match, continue reading mdev.conf
# =: move, >: move and create a symlink
# !: do not create device node
# @|$|*: run cmd if $ACTION=remove, @cmd if $ACTION=add, *cmd in all cases

# support module loading on hotplug
$MODALIAS=.*	root:root 0660 @modprobe -q -b "$MODALIAS"

# Core devices
console			root:root 0600
fuse			root:root 0660
# hw_random		root:root 0666
# hwrandom		root:root 0666
hwrng			root:root 0660
null			root:root 0666
# ptp[0-9]		root:root 0660
random			root:root 0666
rfkill			root:root 0640
rtc[0-9]*		root:root 0664 >misc/
urandom			root:root 0666
watchdog[0-9]*	root:root 0600
zero			root:root 0666

ttyACM[0-9]*	root:dialout 0666
ttyS[0-9]*		root:dialout 0666
ttyUSB[0-9]*	root:dialout 0666

kvm				root:kvm  0660
vhost-net		root:kvm  0660

tty[0-9]*		root:tty 0666
ptmx			root:tty 0666
vcs[0-9]*		root:tty 0600
vcsa[0-9]*		root:tty 0600
# -----------------------------------------

control.*		root:audio 0660	=snd/
pcm.*			root:audio 0660	=snd/
seq				root:audio 0660	=snd/
snd/.*			root:audio 0660
timer			root:audio 0660	=snd/
# SUBSYSTEM=sound;.*	root:audio 0660
# -----------------------------------------

# input stuff
event[0-9]+		root:input 0660 =input/
js[0-9]			root:input 0660 =input/
mice			root:input 0660 =input/
mouse[0-9]		root:input 0660 =input/
input/event.*	root:input 0660 */etc/mdev/input-link.sh
# SUBSYSTEM=input;.*  root:input 0660
# -----------------------------------------

# block devices
bsg/.*			root:disk 0660
loop([0-9]+)	root:disk 0660 >loop/%1
mmcblk.*		root:disk 0660
ram([0-9]*)		root:disk 0660 >rd/%1
sd[a-z][0-9]*	root:disk 0660
sg[0-9]*		root:disk 0660
# SUBSYSTEM=block;.* root:disk 660
# -----------------------------------------

# /dev/cpu support.
cpu([0-9]+)			root:root 0600 =cpu/%1/cpuid
microcode			root:root 0600 =cpu/
msr([0-9]+)			root:root 0600 =cpu/%1/msr
# -----------------------------------------

# graphics --- dri
card[0-9]*			root:video 0660	=dri/
controlD[0-9]*		root:video 0660	=dri/
dri/.*				root:video 0660
fb[0-9]*			root:video 0660 @modprobe -q -b fbcon
vchiq				root:video 0660
vcio				root:video 0660
vc-mem				root:video 0660
vcsm-cma			root:video 0660
video[0-9]+			root:video 0660 >v4l/
# -----------------------------------------

bus/usb/.*			root:dialout 0660
usb[0-9]+			root:dialout 0660
usbdev.*			root:dialout 0660 !
# SUBSYSTEM=usb;DEVTYPE=usb_device;.* root:dialout 0660
# -----------------------------------------

# Catch-all other devices, Right now useful only for debuging.
.+			root:root 0440	=other/
#.* root:root 660 */opt/mdev/helpers/catch-all
